[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/rpc"
  to = "/.netlify/functions/rpc-proxy"
  status = 200

[[redirects]]
  from = "/api/submit-bundle"
  to = "/.netlify/functions/submit-bundle"
  status = 200

[[redirects]]
  from = "/api/get-tip"
  to = "/.netlify/functions/get-tip"
  status = 200

[[redirects]]
  from = "/api/reason-retry"
  to = "/.netlify/functions/reason-retry"
  status = 200